# Golden corpus manifest for decompiler regression tests.
#
# Binaries are built by tests/decompiler/CMakeLists.txt (fib_smoke).
# To add a fixture without a prebuilt binary, list `source` and compile with:
#   cc -O1 -o build/fib_smoke tests/test_binaries/fib.c

fixtures:
  - id: fib
    description: Recursive fibonacci + printf loop (tests/test_binaries/fib.c)
    source: ../../test_binaries/fib.c
    # binary path is passed by CTest (${CMAKE_CURRENT_BINARY_DIR}/fib_smoke)
    min_functions: 1
    keyword: printf
