name: ctest-linux

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  RETDEC_GUI_HEADLESS: "1"
  QT_QPA_PLATFORM: offscreen

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ninja-build \
            python3 \
            python3-yaml \
            perl \
            qt6-base-dev \
            qt6-base-dev-tools \
            libqt6svg6-dev \
            libgl1-mesa-dev \
            libxkbcommon-dev \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxcb-xinerama0 \
            libxcb-xfixes0

      - uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "3.31.6"

      - name: Fetch large support files
        run: |
          ./scripts/fetch-large-files.sh
          if [ $? -ne 0 ]; then
            ./scripts/fetch-large-files.sh --base-url "https://raw.githubusercontent.com/odin-loki/RetDec-Decompiler/main"
          fi

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: build/linux
          key: ctest-linux-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', 'cmake/**', 'src/**', 'deps/**') }}
          restore-keys: |
            ctest-linux-

      - name: Configure (full-linux-debug, CPU-only CI)
        run: >
          cmake --preset full-linux-debug
          -DRETDEC_ENABLE_CUDA_ACCEL=OFF

      - name: Build integration targets
        run: >
          cmake --build build/linux --parallel
          --target retdec-decompiler retdec-gui retdec-gui-tests
          format_router_probe retdec-decompiler-fixture-fib

      - name: GUI unit tests (headless)
        run: ./build/linux/tests/gui/retdec-gui-tests

      - name: Unit tests
        run: ctest --test-dir build/linux -L unit --output-on-failure

      - name: Integration tests
        run: ctest --test-dir build/linux --output-on-failure -L integration
