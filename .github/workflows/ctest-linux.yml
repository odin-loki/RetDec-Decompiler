name: ctest-linux

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            python3 \
            perl \
            qt6-base-dev \
            qt6-base-dev-tools \
            libgl1-mesa-dev \
            libxkbcommon-dev

      - name: Configure (full-linux-debug)
        run: cmake --preset full-linux-debug

      - name: Build
        run: cmake --build build/linux --parallel

      - name: GUI unit tests (headless)
        run: ./build/linux/tests/gui/retdec-gui-tests
        env:
          RETDEC_GUI_HEADLESS: "1"
          QT_QPA_PLATFORM: offscreen

      - name: Integration tests
        run: ctest --test-dir build/linux --output-on-failure -L integration
        env:
          RETDEC_GUI_HEADLESS: "1"
          QT_QPA_PLATFORM: offscreen
